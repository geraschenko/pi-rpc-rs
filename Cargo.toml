[package]
name = "pi-rpc-rs"
version = "0.1.0"
authors = ["Anton Geraschenko <gerascheko@gmail.com>"]
edition = "2024"
license = "MIT"
repository = "https://github.com/geraschenko/pi-rpc-rs"
description = "A typed, ergonomic Rust interface to pi's RPC mode (pi --mode rpc)"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
